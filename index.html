<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Миний Санхүү</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Миний Санхүү">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489602.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Доллар Ногоон Өнгөний Сэдэв */
            --bg-color: #0d1f10;       /* Харанхуй доллар ногоон арын дэвсгэр */
            --card-bg: #16331b;        /* Картуудын ногоон өнгө */
            --primary: #45ff79;         /* Тод ногоон гэрэлтсэн өнгө */
            --secondary: #a3ffd0;       /* Зөөлөн цайвар ногоон */
            --text-color: #b3cbb7;      /* Текстний бүдэг ногоон өнгө */
            --text-light: #ffffff;      /* Цагаан текст */
            --danger: #ff5252;
            --success: #2ecc71;
            --warning: #f1c40f;
            --border: #224d29;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 16px;
        }

        .header { margin: 15px 0 20px 0; }
        .header h1 { color: var(--text-light); margin: 0; font-size: 26px; font-weight: 700; }
        .header p { margin: 4px 0 0 0; color: var(--primary); font-size: 14px; letter-spacing: 1px; }

        .net-worth-card {
            background: linear-gradient(135deg, #16331b 0%, #0d1f10 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .net-worth-card .amount { font-size: 34px; color: var(--text-light); font-weight: 800; margin: 10px 0; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box { background-color: var(--card-bg); border-radius: 16px; padding: 14px; border: 1px solid var(--border); }
        .stat-box .label { font-size: 11px; margin-bottom: 4px; }
        .stat-box .val { font-size: 15px; font-weight: 700; color: var(--text-light); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background-color: var(--card-bg); border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid var(--border); }
        .card h3 { margin: 0 0 14px 0; font-size: 16px; color: var(--text-light); display: flex; justify-content: space-between; align-items: center; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-color); }
        input, select {
            width: 100%; background-color: #0a170b; border: 1px solid var(--border);
            color: var(--text-light); padding: 12px; border-radius: 10px; font-size: 15px; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        
        .dynamic-field { display: none; background: #0f2413; padding: 10px; border-radius: 10px; margin-bottom: 12px; border: 1px dashed var(--border); }
        
        button.btn-block {
            width: 100%; background-color: var(--primary); color: #000; border: none;
            padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        .btn-mini {
            background-color: var(--primary); color: #000; border: none;
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
        }

        .list-items { max-height: 380px; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1c4022; }
        .item-name { font-weight: 600; color: var(--text-light); font-size: 15px; }
        .item-sub { font-size: 12px; color: var(--text-color); margin-top: 2px; }
        .item-amt { font-weight: 700; font-size: 15px; }
        .item-amt.inc { color: var(--primary); }
        .item-amt.exp { color: var(--danger); }
        .item-amt.warn { color: var(--warning); }
        .item-amt.info { color: #cc66ff; }

        .del-btn { background: none; border: none; color: #ff5252; font-size: 16px; margin-left: 10px; cursor: pointer; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: calc(65px + env(safe-area-inset-bottom));
            background-color: #0a170b; border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-color); font-size: 11px; background: none; border: none; width: 25%;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }

        .loan-badge { background: #0f2413; padding: 8px; border-radius: 8px; font-size: 12px; margin-top: 6px; border: 1px solid #1c4022; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Миний Санхүү</h1>
        <p>ХУВИЙН САНХҮҮГИЙН БҮРТГЭЛ</p>
    </div>

    <div class="net-worth-card">
        <div style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Цэвэр Хөрөнгө</div>
        <div class="amount" id="net-worth">0 ₮</div>
        <div style="font-size: 11px; color: var(--text-color);">Зээлүүлсэн мөнгө хөрөнгөөс хасагдсан болно</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box" style="border-left: 4px solid var(--success);">
            <div class="label" style="color:var(--success);">🟢 Нийт Орлого</div>
            <div class="val" id="total-inc">0 ₮</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid var(--danger);">
            <div class="label" style="color:var(--danger);">🔴 Нийт Зарлага</div>
            <div class="val" id="total-exp">0 ₮</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid var(--warning);">
            <div class="label" style="color:var(--warning);">🤝 Зээлүүлсэн (Авлага)</div>
            <div class="val" id="total-lent">0 ₮</div>
        </div>
        <div class="stat-box" style="border-left: 4px solid #cc66ff;">
            <div class="label" style="color:#cc66ff;">🏦 Авсан зээлийн үлдэгдэл</div>
            <div class="val" id="total-borrowed">0 ₮</div>
        </div>
    </div>

    <div id="tab-home" class="tab-content active">
        <div class="card">
            <h3>📈 Зарлагын бүтэц</h3>
            <div style="position: relative; height: 180px; width: 100%;">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>
                <span>🏦 Идэвхтэй зээлийн хяналт</span>
                <button class="btn-mini" onclick="goToAddLoan()">➕ Нэмэх</button>
            </h3>
            <div id="active-loans-list" style="max-height: 200px; overflow-y: auto;">
                </div>
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="card">
            <h3>➕ Шинэ бичилт хийх</h3>
            <form id="tx-form">
                <div class="form-group">
                    <label>Гүйлгээний төрөл</label>
                    <select id="tx-type" onchange="adjustFormFields()">
                        <option value="expense">💸 Жирийн зарлага (-)</option>
                        <option value="income">💰 Жирийн орлого (+)</option>
                        <option value="lent">🤝 Хүнд мөнгө зээлүүлсэн (-)</option>
                        <option value="repay_in">💰 Зээлүүлсэн мөнгөө буцааж авсан (+)</option>
                        <option value="borrowed">🏦 Шинээр тогтмол зээл авах (+)</option>
                        <option value="repay_out">💸 Авсан зээлээсээ төлөх (-)</option>
                    </select>
                </div>

                <div id="field-lent" class="dynamic-field">
                    <div class="form-group">
                        <label>Хэнд зээлүүлсэн? (Нэр)</label>
                        <input type="text" id="lent-to" placeholder="Жишээ: Болд">
                    </div>
                </div>

                <div id="field-loan-details" class="dynamic-field">
                    <div class="form-group">
                        <label>Сар бүр төлөх өдөр (1-31 хооронд тоо)</label>
                        <input type="number" id="loan-pay-day" placeholder="Жишээ: 25" min="1" max="31">
                    </div>
                    <div class="form-group">
                        <label>Зээл дуусах огноо</label>
                        <input type="date" id="loan-end-date">
                    </div>
                </div>

                <div id="field-account" class="dynamic-field">
                    <div class="form-group">
                        <label>Ямар данс руу орсон / гарсан?</label>
                        <select id="target-account">
                            <option value="Хаан Банк карт">💳 Хаан Банк карт</option>
                            <option value="Голомт карт">💳 Голомт карт</option>
                            <option value="Бэлэн мөнгө">💵 Бэлэн мөнгө</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Үндсэн ангилал</label>
                    <select id="tx-cat">
                        </select>
                </div>
                <div class="form-group">
                    <label>Мөнгөн дүн (₮)</label>
                    <input type="number" id="tx-amount" placeholder="Дүн оруулна уу" required>
                </div>
                <div class="form-group">
                    <label>Нэмэлт тайлбар (Зээлийн нэр г.м)</label>
                    <input type="text" id="tx-desc" placeholder="Жишээ: Хас цалингийн зээл" required>
                </div>
                <button type="submit" class="btn-block">Хадгалах</button>
            </form>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="card">
            <h3>📋 Сүүлийн гүйлгээнүүд</h3>
            <div class="list-items" id="tx-list"></div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active" onclick="switchTab('tab-home', this)"><span>📊</span>Дашбоард</button>
    <button class="nav-item" onclick="switchTab('tab-add', this)"><span>➕</span>Бичилт</button>
    <button class="nav-item" onclick="switchTab('tab-history', this)"><span>📋</span>Түүх</button>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('my_finance_pwa_v4')) || [];
    let chartObj = null;

    function goToAddLoan() {
        const addTabBtn = document.querySelectorAll('.nav-bar button')[1];
        switchTab('tab-add', addTabBtn);
        document.getElementById('tx-type').value = 'borrowed';
        adjustFormFields();
    }

    function adjustFormFields() {
        const type = document.getElementById('tx-type').value;
        const catSelect = document.getElementById('tx-cat');
        
        if (!catSelect) return; 
        
        document.getElementById('field-lent').style.display = 'none';
        document.getElementById('field-loan-details').style.display = 'none';
        document.getElementById('field-account').style.display = 'none';
        catSelect.innerHTML = '';

        if (type === 'expense') {
            catSelect.innerHTML = `
                <option value="Хоол хүнс">🛒 Хоол хүнс</option>
                <option value="Бензин, унаа">🚘 Бензин, унаа</option>
                <option value="Ахуйн хэрэглээ">🏠 Ахуйн хэрэглээ</option>
                <option value="Гоо сайхан">💄 Гоо сайхан</option>
                <option value="Эрүүл мэнд">🩺 Эрүүл мэнд</option>
                <option value="Хүү">📈 Хүү</option>
                <option value="Нөхөр">👨 Нөхөр</option>
                <option value="Өөртөө">💃 Өөртөө</option>
            `;
        } else if (type === 'income') {
            catSelect.innerHTML = `<option value="Цалин">💼 Цалин, орлого</option><option value="Бусад">📦 Бусад орлого</option>`;
        } else if (type === 'lent') {
            document.getElementById('field-lent').style.display = 'block';
            catSelect.innerHTML = `<option value="Зээлүүлсэн мөнгө">🤝 Хүнд зээлүүлсэн</option>`;
        } else if (type === 'repay_in') {
            document.getElementById('field-account').style.display = 'block';
            catSelect.innerHTML = `<option value="Зээл буцаж орсон">💰 Зээл буцаж авсан</option>`;
        } else if (type === 'borrowed') {
            document.getElementById('field-loan-details').style.display = 'block';
            catSelect.innerHTML = `<option value="Тогтмол зээл">🏦 Шинэ тогтмол зээл</option>`;
        } else if (type === 'repay_out') {
            document.getElementById('field-account').style.display = 'block';
            catSelect.innerHTML = `<option value="Зээл төлөлт">💸 Авсан зээлээс төлсөн</option>`;
        }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        if(tabId === 'tab-home') render();
    }

    function render() {
        const listContainer = document.getElementById('tx-list');
        const activeLoansContainer = document.getElementById('active-loans-list');
        
        if(listContainer) listContainer.innerHTML = '';
        if(activeLoansContainer) activeLoansContainer.innerHTML = '';

        let totalInc = 0, totalExp = 0, totalLent = 0, totalBorrowed = 0;
        let loanSummary = {};

        transactions.forEach(t => {
            let sign = '-', cls = 'exp', subDetails = '';

            if (t.type === 'income') { totalInc += t.amount; sign = '+'; cls = 'inc'; }
            else if (t.type === 'expense') { totalExp += t.amount; sign = '-'; cls = 'exp'; }
            else if (t.type === 'lent') { 
                totalLent += t.amount; sign = '-'; cls = 'warn'; 
                subDetails = ` | Хэнд: <b>${t.lentTo || 'Үл мэдэгдэх'}</b>`;
            }
            else if (t.type === 'repay_in') { totalLent -= t.amount; sign = '+'; cls = 'inc'; }
            else if (t.type === 'borrowed') { 
                totalBorrowed += t.amount; sign = '+'; cls = 'info';
                loanSummary[t.desc] = {
                    total: (loanSummary[t.desc]?.total || 0) + t.amount,
                    payDay: t.payDay,
                    endDate: t.endDate
                };
            }
            else if (t.type === 'repay_out') { 
                totalBorrowed -= t.amount; sign = '-'; cls = 'exp';
                if(loanSummary[t.desc]) {
                    loanSummary[t.desc].total -= t.amount;
                }
            }

            if(listContainer) {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div>
                        <div class="item-name">${t.desc}</div>
                        <div class="item-sub">${t.cat}${subDetails} · ${t.date}</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="item-amt ${cls}">${sign}${t.amount.toLocaleString()} ₮</span>
                        <button class="del-btn" onclick="deleteTx(${t.id})">✕</button>
                    </div>
                `;
                listContainer.appendChild(row);
            }
        });

        if(activeLoansContainer) {
            Object.keys(loanSummary).forEach(loanName => {
                const loan = loanSummary[loanName];
                if(loan.total > 0) {
                    const loanBox = document.createElement('div');
                    loanBox.className = 'loan-badge';
                    loanBox.innerHTML = `
                        💸 <b>${loanName}</b>: Үлдэгдэл: <span style="color:var(--danger)">${loan.total.toLocaleString()} ₮</span><br>
                        🗓️ Төлөх өдөр: Сар бүрийн <b>${loan.payDay || '-'}</b> | 🏁 Дуусах хугацаа: <b>${loan.endDate || '-'}</b>
                    `;
                    activeLoansContainer.appendChild(loanBox);
                }
            });
            if(activeLoansContainer.innerHTML === '') {
                activeLoansContainer.innerHTML = '<div style="color:var(--text-color); font-size:13px; text-align:center; padding:10px;">Идэвхтэй зээл байхгүй</div>';
            }
        }

        const cashInHand = totalInc - totalExp - (transactions.filter(t=>t.type==='lent').reduce((s,t)=>s+t.amount,0) - transactions.filter(t=>t.type==='repay_in').reduce((s,t)=>s+t.amount,0)) + (transactions.filter(t=>t.type==='borrowed').reduce((s,t)=>s+t.amount,0) - transactions.filter(t=>t.type==='repay_out').reduce((s,t)=>s+t.amount,0));
        const netWorth = cashInHand - totalBorrowed; 

        if(document.getElementById('net-worth')) document.getElementById('net-worth').innerText = `${netWorth.toLocaleString()} ₮`;
        if(document.getElementById('total-inc')) document.getElementById('total-inc').innerText = `${totalInc.toLocaleString()} ₮`;
        if(document.getElementById('total-exp')) document.getElementById('total-exp').innerText = `${totalExp.toLocaleString()} ₮`;
        if(document.getElementById('total-lent')) document.getElementById('total-lent').innerText = `${Math.max(0, totalLent).toLocaleString()} ₮`;
        if(document.getElementById('total-borrowed')) document.getElementById('total-borrowed').innerText = `${Math.max(0, totalBorrowed).toLocaleString()} ₮`;

        updateChart();
    }

    const txForm = document.getElementById('tx-form');
    if(txForm) {
        txForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('tx-type').value;
            const cat = document.getElementById('tx-cat').value;
            const amount = parseInt(document.getElementById('tx-amount').value);
            const desc = document.getElementById('tx-desc').value;
            
            const lentTo = document.getElementById('lent-to').value;
            const payDay = document.getElementById('loan-pay-day').value;
            const endDate = document.getElementById('loan-end-date').value;
            const account = document.getElementById('target-account').value;

            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()}`;

            const newTx = { id: Date.now(), type, cat, amount, desc, date: dateStr, lentTo, payDay, endDate, account };
            transactions.unshift(newTx);
            
            localStorage.setItem('my_finance_pwa_v4', JSON.stringify(transactions));
            render();
            
            this.reset();
            adjustFormFields();
            switchTab('tab-home', document.querySelectorAll('.nav-item')[0]);
        });
    }

    function deleteTx(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('my_finance_pwa_v4', JSON.stringify(transactions));
        render();
    }

    function updateChart() {
        const categories = ['Хоол хүнс', 'Бензин, унаа', 'Ахуйн хэрэглээ', 'Гоо сайхан', 'Эрүүл мэнд', 'Хүү', 'Нөхөр', 'Өөртөө'];
        const dataVals = categories.map(cat => {
            return transactions
                .filter(t => t.type === 'expense' && t.cat === cat)
                .reduce((sum, t) => sum + t.amount, 0);
        });

        const canvas = document.getElementById('expenseChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if(chartObj) chartObj.destroy();

        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: categories,
                datasets: [{ 
                    data: dataVals, 
                    backgroundColor: ['#2ecc71', '#ff5252', '#45ff79', '#ffb300', '#3498db', '#9b59b6', '#e67e22', '#1abc9c'], 
                    borderWidth: 0 
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'right', labels: { color: '#b3cbb7', font: { size: 10 } } } }
            }
        });
    }

    document.addEventListener("DOMContentLoaded", function() {
        adjustFormFields();
        render();
    });
</script>
</body>
</html>
